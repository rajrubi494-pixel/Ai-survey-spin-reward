<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mega Spin & Win - Unlimited Rewards</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: #000;
            color: white;
            overflow-x: hidden;
            margin: 0;
        }

        /* Full Page Background Decoration */
        .bg-decor-wall {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            padding: 10px;
            opacity: 0.2;
        }

        .bg-item {
            width: 100%;
            height: 120px;
            background: linear-gradient(45deg, #1a1a1a, #333);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            animation: pulse 3s infinite alternate;
        }

        @keyframes pulse {
            from { transform: scale(0.9); opacity: 0.5; }
            to { transform: scale(1.1); opacity: 1; }
        }

        .glass-ui {
            background: rgba(15, 15, 15, 0.9);
            backdrop-filter: blur(25px);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            box-shadow: 0 0 50px rgba(0,0,0,1);
        }

        /* Wheel Styling */
        .wheel-container {
            position: relative;
            width: 330px;
            height: 330px;
            margin: auto;
            border: 10px solid #222;
            border-radius: 50%;
            box-shadow: 0 0 40px #2563eb;
        }

        #wheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            position: relative;
            overflow: hidden;
            transition: transform 5s cubic-bezier(0.15, 0, 0.1, 1);
        }

        .segment {
            position: absolute;
            width: 50%;
            height: 50%;
            transform-origin: 100% 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .segment-content {
            transform: skewY(45deg) rotate(22.5deg);
            position: absolute;
            right: 15px;
            top: 40px;
            text-align: center;
            width: 80px;
        }

        .segment img {
            width: 30px;
            height: 30px;
            margin: 0 auto 4px;
            object-fit: contain;
        }

        .segment span {
            font-size: 8px;
            font-weight: 900;
            display: block;
            line-height: 1;
        }

        .pointer {
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            width: 0; height: 0;
            border-left: 20px solid transparent;
            border-right: 20px solid transparent;
            border-top: 40px solid #ef4444;
        }

        .hidden { display: none; }
        
        .btn-glow {
            background: linear-gradient(90deg, #2563eb, #9333ea);
            box-shadow: 0 0 20px rgba(37, 99, 235, 0.5);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <!-- Decorative Background -->
    <div class="bg-decor-wall" id="wall">
        <!-- Icons added via JS -->
    </div>

    <div class="w-full max-w-md glass-ui p-8 relative">
        
        <!-- INTRO SCREEN -->
        <div id="intro-screen" class="text-center">
            <h1 class="text-4xl font-black mb-2 italic text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-500">GIFT SPIN 2026</h1>
            <p class="text-gray-400 text-sm mb-8">Complete a 2-minute AI survey to spin!</p>
            
            <div class="grid grid-cols-3 gap-2 mb-8">
                <div class="bg-white/5 p-3 rounded-xl border border-white/10">🎁</div>
                <div class="bg-white/5 p-3 rounded-xl border border-white/10">💰</div>
                <div class="bg-white/5 p-3 rounded-xl border border-white/10">💳</div>
            </div>

            <button onclick="startApp()" class="w-full btn-glow py-4 rounded-2xl font-black text-xl hover:scale-105 transition-transform">
                START SURVEY
            </button>
        </div>

        <!-- SURVEY SCREEN -->
        <div id="survey-screen" class="hidden">
            <div class="flex justify-between items-center mb-6">
                <span class="text-blue-400 font-bold text-xs uppercase tracking-widest">Question <span id="q-idx">1</span>/10</span>
                <div class="w-32 h-1 bg-gray-800 rounded-full">
                    <div id="q-bar" class="h-full bg-blue-500 rounded-full transition-all" style="width: 10%"></div>
                </div>
            </div>
            <div id="q-content" class="min-h-[280px] flex flex-col justify-center">
                <!-- Qs via JS -->
            </div>
        </div>

        <!-- SPIN SCREEN -->
        <div id="spin-screen" class="hidden text-center">
            <h2 class="text-2xl font-black text-yellow-500 mb-6">SURVEY COMPLETE! SPIN NOW</h2>
            <div class="wheel-container">
                <div class="pointer"></div>
                <div id="wheel"></div>
            </div>
            <button id="spin-btn" onclick="handleSpin()" class="w-full mt-10 py-4 bg-orange-600 rounded-2xl font-black text-2xl shadow-xl hover:bg-orange-500">
                SPIN
            </button>
        </div>

        <!-- REWARD SCREEN -->
        <div id="reward-screen" class="hidden">
            <div class="text-center mb-6">
                <div class="text-5xl mb-2">🎉</div>
                <h2 class="text-3xl font-black text-white">YOU WON!</h2>
            </div>
            
            <div id="reward-card" class="bg-zinc-900 rounded-3xl p-6 border-2 border-blue-600 relative overflow-hidden">
                <!-- Reward Content -->
            </div>

            <button onclick="resetApp()" class="w-full mt-6 py-3 border-2 border-white/10 rounded-xl font-bold text-gray-400 hover:text-white">
                Play Again
            </button>
        </div>

    </div>

    <script>
        // Logotypes
        const logos = {
            amazon: 'https://upload.wikimedia.org/wikipedia/commons/a/a9/Amazon_logo.svg',
            myntra: 'https://upload.wikimedia.org/wikipedia/commons/b/bc/Myntra_Logo.png',
            flipkart: 'https://upload.wikimedia.org/wikipedia/commons/7/7a/Flipkart_logo.svg',
            jio: 'https://upload.wikimedia.org/wikipedia/en/5/5f/JioSaavn_Logo.png',
            pocket: 'https://upload.wikimedia.org/wikipedia/commons/e/e0/Pocket_FM_Logo.png',
            gaana: 'https://upload.wikimedia.org/wikipedia/commons/c/c5/Gaana_logo.png'
        };

        // Prizes Array (Equal chances for Amazon Pay)
        const prizes = [
            { label: "Amazon Pay", brand: "amazon", logo: logos.amazon, color: "#232f3e", code: "P83FRCBUHBENPB", pin: "6014883324602031", val: "₹10 Gift Card" },
            { label: "Myntra", brand: "myntra", logo: logos.myntra, color: "#fe3f6c", code: "8FK3NC6ECKQ4PLP4", pin: "None", val: "5% Off Voucher" },
            { label: "JioSaavn", brand: "jio", logo: logos.jio, color: "#24d171", code: "FLKJS1M", pin: "20025049", val: "30 Days Pro" },
            { label: "Flipkart", brand: "flipkart", logo: logos.flipkart, color: "#2874f0", code: "FK_WIN_99", pin: "None", val: "Special Discount" },
            { label: "Amazon Pay", brand: "amazon", logo: logos.amazon, color: "#232f3e", code: "DUYYDPWR4XRHPA", pin: "6014883321858835", val: "₹10 Gift Card" },
            { label: "Myntra Men", brand: "myntra", logo: logos.myntra, color: "#fe3f6c", code: "8FK3NCN3LTEGPEP8", pin: "None", val: "₹100 Off" },
            { label: "Pocket FM", brand: "pocket", logo: logos.pocket, color: "#f39c12", code: "FPBBDKI4W62DAEJUNJ0", pin: "None", val: "14 Days Sub" },
            { label: "Gaana Plus", brand: "gaana", logo: logos.gaana, color: "#e11d48", code: "FK7564VD22H7", pin: "None", val: "60 Days Trial" }
        ];

        const questions = [
            { q: "Aapka favourite shopping app?", o: ["Amazon", "Flipkart", "Myntra"] },
            { q: "AI tools (ChatGPT) kitna use karte hain?", o: ["Daily", "Weekly", "Nahi karte"] },
            { q: "Kaunsa reward zyada pasand hai?", o: ["Gift Cards", "Cashback", "Coupons"] },
            { q: "Online safety important hai?", o: ["Bilkul", "Nahi", "Pata nahi"] },
            { q: "Aapka next gadget purchase?", o: ["Smartphone", "Laptop", "Audio"] },
            { q: "Survey rewards trustworthy hote hain?", o: ["Haan", "Shayad", "Nahi"] },
            { q: "Streaming ke liye fav app?", o: ["YouTube", "JioSaavn", "Gaana"] },
            { q: "Doston ke saath rewards share karte hain?", o: ["Haan", "Kabhi-kabhi", "Nahi"] },
            { q: "AI future mein help karega?", o: ["Yes", "No", "Maybe"] },
            { q: "Ready to spin the wheel?", o: ["Ready!", "Let's Go", "Yes"] }
        ];

        // Fill background
        const wall = document.getElementById('wall');
        const icons = ['🎁', '💳', '🛍️', '🔥', '💎'];
        for(let i=0; i<32; i++) {
            const div = document.createElement('div');
            div.className = 'bg-item';
            div.innerText = icons[i % icons.length];
            wall.appendChild(div);
        }

        let currentQ = 0;

        function startApp() {
            document.getElementById('intro-screen').classList.add('hidden');
            document.getElementById('survey-screen').classList.remove('hidden');
            loadQuestion();
        }

        function loadQuestion() {
            const q = questions[currentQ];
            document.getElementById('q-idx').innerText = currentQ + 1;
            document.getElementById('q-bar').style.width = (currentQ + 1) * 10 + '%';
            document.getElementById('q-content').innerHTML = `
                <h3 class="text-2xl font-bold mb-8">${q.q}</h3>
                <div class="space-y-4">
                    ${q.o.map(opt => `<button onclick="nextQ()" class="w-full text-left p-5 bg-white/5 border border-white/10 rounded-2xl hover:bg-white/10 font-bold transition-all border-l-4 border-transparent hover:border-blue-500">${opt}</button>`).join('')}
                </div>
            `;
        }

        function nextQ() {
            currentQ++;
            if(currentQ < 10) loadQuestion();
            else {
                document.getElementById('survey-screen').classList.add('hidden');
                document.getElementById('spin-screen').classList.remove('hidden');
                initWheel();
            }
        }

        function initWheel() {
            const wheel = document.getElementById('wheel');
            wheel.innerHTML = '';
            prizes.forEach((p, i) => {
                const el = document.createElement('div');
                el.className = 'segment';
                el.style.transform = `rotate(${i * 45}deg) skewY(-45deg)`;
                el.style.backgroundColor = p.color;
                el.innerHTML = `
                    <div class="segment-content">
                        <img src="${p.logo}" class="${p.brand==='amazon'?'invert':''}">
                        <span>${p.label}</span>
                    </div>
                `;
                wheel.appendChild(el);
            });
        }

        function handleSpin() {
            const btn = document.getElementById('spin-btn');
            btn.disabled = true;
            btn.style.opacity = '0.5';

            const prizeIdx = Math.floor(Math.random() * prizes.length);
            const deg = (5 * 360) + (360 - (prizeIdx * 45)) - 22.5;
            
            document.getElementById('wheel').style.transform = `rotate(${deg}deg)`;

            setTimeout(() => {
                confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
                showReward(prizes[prizeIdx]);
            }, 5200);
        }

        function showReward(p) {
            document.getElementById('spin-screen').classList.add('hidden');
            document.getElementById('reward-screen').classList.remove('hidden');

            document.getElementById('reward-card').innerHTML = `
                <div class="flex items-center gap-4 mb-6">
                    <img src="${p.logo}" class="h-12 ${p.brand==='amazon'?'invert':''}">
                    <div>
                        <p class="text-xs text-gray-500 font-bold uppercase tracking-widest">${p.label}</p>
                        <p class="text-xl font-black text-blue-400">${p.val}</p>
                    </div>
                </div>
                
                <div class="space-y-4 mb-6">
                    <div class="bg-black/50 p-4 rounded-xl border border-white/5">
                        <p class="text-[10px] text-gray-500 font-bold mb-1">VOUCHER CODE</p>
                        <p class="text-xl font-mono font-bold text-yellow-500 break-all select-all">${p.code}</p>
                    </div>
                    ${p.pin !== 'None' ? `
                    <div class="bg-black/50 p-4 rounded-xl border border-white/5">
                        <p class="text-[10px] text-gray-500 font-bold mb-1">PIN / REFERENCE</p>
                        <p class="text-sm font-mono text-gray-400 select-all">${p.pin}</p>
                    </div>
                    ` : ''}
                </div>

                <div class="text-[10px] text-gray-500 text-left">
                    <p class="font-bold mb-1 uppercase">How to Redeem:</p>
                    <p>Open ${p.label} App > Go to Payments/Rewards > Apply the voucher code provided above.</p>
                </div>
            `;
        }

        function resetApp() {
            currentQ = 0;
            document.getElementById('reward-screen').classList.add('hidden');
            document.getElementById('intro-screen').classList.remove('hidden');
            document.getElementById('wheel').style.transform = `rotate(0deg)`;
            document.getElementById('spin-btn').disabled = false;
            document.getElementById('spin-btn').style.opacity = '1';
        }
    </script>
</body>
  </html>
